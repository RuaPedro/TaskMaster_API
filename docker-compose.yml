version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: taskmaster_db
    environment:
      POSTGRES_DB: TASKMASTER_DB
      POSTGRES_USER: postgress
      POSTGRES_PASSWORD: pedroRua
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgress -d TASKMASTER_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    container_name: taskmaster_api
    env_file:
      - api/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
